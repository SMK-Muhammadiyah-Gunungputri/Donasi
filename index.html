<!DOCTYPE html>

<style>

}

body{

  background:#fff;
  background-image: repeating-linear-gradient(
    to bottom,#ffffff 0px,#ffffff 23px,#dcdcdc 24px
  );
}

header{
  background:linear-gradient(135deg,var(--primary),#2747a9);
  color:white;
  text-align:center;
  padding:2.5rem;

}

.container{
  width:min(1000px,92%);
  margin:2rem auto;
}

.card{
  background:#fff;
  padding:1.5rem;
  border-radius:18px;
  border:2px dashed var(--primary);

}

h2{
  color:var(--primary);

}

select,input{
  width:100%;
  padding:10px;

  border:1px solid #ccc;
}

button{

  border:none;
  border-radius:20px;
  background:var(--primary);
  color:#fff;

  cursor:pointer;
}

.result{

  margin-top:20px;

.wa-float{

  height:60px;

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const nominal=document.getElementById("nominal");
const potongan=document.getElementById("potongan");
const bersih=document.getElementById("bersih");
const form=document.getElementById("formDonasi");
const result=document.getElementById("result");

// ✅ INIT SUPABASE (FIX)
const supabaseClient = window.supabase.createClient(
  "https://copkomggoopwzlntlexb.supabase.co",
  "sb_publishable_KQ9O8EzRvInRU0Y99x3mow_qRegVwJj"
);

function rupiah(x){
 return "Rp "+Number(x).toLocaleString("id-ID");
}

nominal.addEventListener("input",()=>{
 let n=nominal.value||0;
 let pot=n*0.03;
 let net=n-pot;

 potongan.value=rupiah(pot);
 bersih.value=rupiah(net);
});

// ✅ LOAD TOTAL DONASI (AMAN)
async function loadTotal(){
  let { data, error } = await supabaseClient
    .from("donasi")
    .select("bersih");

  if(error){
    console.log(error);
    return;
  }

  let total = 0;
  if(data){
    total = data.reduce((a,b)=>a + (b.bersih || 0), 0);
  }

  document.getElementById("totalDonasi").innerText =
    "Rp " + total.toLocaleString("id-ID");
}

// ✅ REALTIME
supabaseClient
  .channel('realtime-donasi')
  .on('postgres_changes',
    { event: 'INSERT', schema: 'public', table: 'donasi' },
    payload => {
      loadTotal();
    }
  )
  .subscribe();

loadTotal();

function download(data){
 let text=`
JURNAL DONASI

Nama: ${data.nama}
Kategori: ${data.kategori}
Nominal: ${data.nominal}
Potongan: ${data.potongan}
Total Bersih: ${data.bersih}
Tanggal: ${new Date().toLocaleString("id-ID")}

Rekening Tujuan:
BSI 7343813354
a.n Rizky Ahmed Darmawan
`;

 let blob=new Blob([text],{type:"text/plain"});
 let url=URL.createObjectURL(blob);

 let a=document.createElement("a");
 a.href=url;
 a.download="bukti-donasi.txt";
 a.click();
}

// ✅ SUBMIT (SUDAH MASUK SUPABASE)
form.addEventListener("submit", async function(e){
 e.preventDefault();

 let n=parseInt(nominal.value||0);
 let pot=n*0.03;
 let net=n-pot;

 const file = fileInput.files[0];

 if(!file){
   alert("Upload bukti transfer dulu!");
   return;
 }

 // ✅ Upload ke Supabase Storage
 const fileName = Date.now() + "_" + file.name;

 const { data: uploadData, error: uploadError } = await supabaseClient
   .storage
   .from('bukti-donasi')
   .upload(fileName, file);

 if(uploadError){
   alert("Gagal upload bukti!");
   console.log(uploadError);
   return;
 }

 // ✅ Ambil URL file
 const { data: publicUrlData } = supabaseClient
   .storage
   .from('bukti-donasi')
   .getPublicUrl(fileName);

 const fileUrl = publicUrlData.publicUrl;

 // ✅ SIMPAN KE DATABASE
 const { error } = await supabaseClient
   .from("donasi")
   .insert([{
     nama:form.querySelector('[name="Nama"]').value,
     kategori:form.querySelector('[name="Kategori"]').value,
     nominal:n,
     potongan:pot,
     bersih:net,
     bukti:fileUrl // 🔥 simpan link gambar
   }]);

 if(error){
   alert("Gagal simpan ke database!");
   console.log(error);
   return;
 }

  document.getElementById("buktiEmail").value = fileUrl;
  
 // ✅ tetap kirim email
 fetch(form.action,{
  method:"POST",
  body:new FormData(form)
 });

 // ✅ download bukti
 download({
  nama:form.querySelector('[name="Nama"]').value,
  kategori:form.querySelector('[name="Kategori"]').value,
  nominal:rupiah(n),
  potongan:rupiah(pot),
  bersih:rupiah(net)
 });

 result.style.display="block";
 result.innerHTML=`
 ✅ Donasi berhasil!<br>
 Terima kasih 🙏<br>
 Bukti transfer sudah tersimpan
 `;
});
